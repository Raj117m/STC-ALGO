<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC ALGO V6.0 — ARCHITECTURAL CORE</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;900&family=Syne:wght@400;800&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:wght@300;600&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --black: #000000;
  --surface: #0a0a0a;
  --border: rgba(255,255,255,0.15);
  --text: #ffffff;
  --gold: #f3ff00;
  --cobalt: #00f0ff;
  --pink: #ff00ff;
  --font-heading: 'Unbounded', cursive;
  --font-body: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-stats: 'Syne Mono', monospace;
  --font-gate: 'Cormorant Garamond', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--black); color: var(--text); font-family: var(--font-body); overflow: hidden; scroll-behavior: smooth; }

/* ACCESS GATE */
#access-gate {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease-in-out;
}
#access-gate h1 { font-family: var(--font-gate); font-size: 32px; color: var(--gold); letter-spacing: 5px; margin-bottom: 30px; }
#access-input {
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 24px;
  text-align: center;
  padding: 10px;
  outline: none;
  width: 300px;
  margin-bottom: 20px;
}
#access-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 40px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: 0.3s;
}
#access-btn:hover { background: var(--gold); color: black; }
#access-error { color: #ff0000; font-family: var(--font-mono); font-size: 10px; margin-top: 15px; visibility: hidden; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* 3-COLUMN ARCHITECTURE */
.slide {
  min-height: 100vh;
  position: relative;
  z-index: 10;
  display: flex;
  padding: 0 40px;
  overflow: hidden;
  background: transparent !important;
}

.slide-layout {
  display: flex;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  gap: 40px;
  padding: 100px 0;
}

.stats-col {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 80px;
}

.stat-pill {
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--gold);
  padding: 8px 12px;
  border: 1px solid rgba(255,204,0,0.2);
  margin-bottom: 2px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  animation: statGlow 2.5s ease-in-out infinite alternate;
}

.stat-pill::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,204,0,0.04);
  z-index: -1;
}

@keyframes statGlow {
  0% { 
    box-shadow: 0 0 4px rgba(255,204,0,0.1);
    border-color: rgba(255,204,0,0.15);
    opacity: 0.5;
  }
  100% { 
    box-shadow: 0 0 14px rgba(255,204,0,0.4), 
                0 0 30px rgba(255,204,0,0.1);
    border-color: rgba(255,204,0,0.6);
    opacity: 1;
  }
}

.content-col {
  flex-grow: 1;
  max-width: 1100px;
  margin: 0 auto;
}

/* SCAN LINE */
.scan-line {
  position: absolute;
  top: 0;
  left: -100%;
  width: 1px;
  height: 100%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
  z-index: 100;
  pointer-events: none;
}

/* CANVAS & NAVIGATION (REUSE FROM INDEX) */
#three-canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; pointer-events:none; }
.nav-bar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:20px 40px; z-index:1000; }
.nav-logo { font-family: var(--font-heading); font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -1px; cursor: pointer; }

/* WELCOME SCREEN */
#screen-welcome { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; z-index:100; position:relative; overflow:hidden; visibility: hidden; }
.hero-bg-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:var(--font-heading); font-size:clamp(120px,30vw,500px); color:rgba(255,255,255,0.02); letter-spacing:-15px; pointer-events:none; font-weight:900; z-index:-1; }
.welcome-btn { background:var(--gold); border:none; color:var(--black); padding:24px 60px; font-family:var(--font-heading); font-size:16px; letter-spacing:2px; cursor:pointer; font-weight:800; }

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  #access-input { width: 90%; }
  .slide-layout { flex-direction: column; padding: 60px 20px; }
  .stats-col { 
    width: 100%; 
    flex-direction: row; 
    overflow-x: auto; 
    padding-bottom: 20px; 
    margin-top: 0;
    display: none; /* Desktop sidebar hidden */
  }
  .mobile-stats-row {
    display: flex;
    gap: 8px;
    width: 100%;
    overflow-x: auto;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
  }
  .stat-pill { font-size: 9px; padding: 6px 8px; white-space: nowrap; }
  .content-col { max-width: 100%; }
  .hero-bg-text { font-size: 14vw; }
  .loading-big { font-size: 44px; }
  .p-body { font-size: 12px !important; }
  #three-canvas { opacity: 0.2; }
}

/* REUSE OTHER STYLES FROM INDEX */
.corner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; margin: 0 auto; }
.highlight {
  color: var(--gold);
  font-weight: 600;
  background: rgba(255,204,0,0.08);
  padding: 1px 4px;
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(255,204,0,0.2);
  position: relative;
}

.highlight::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--gold);
  opacity: 0.4;
}
.interstitial { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:50; background:transparent !important; }
.inter-text { font-family:var(--font-heading); font-size:clamp(40px, 6vw, 100px); font-weight:800; line-height:0.9; text-transform:uppercase; letter-spacing:-3px; }

.visuals-row {
  display: flex;
  gap: 16px;
  padding: 0 40px 40px 220px;
  flex-wrap: wrap;
  align-items: stretch;
}

.visual-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 24px;
  flex: 1;
  min-width: 180px;
  max-width: 260px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

.visual-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, var(--gold), transparent);
  opacity: 0.4;
}

.stat-block-value {
  font-family: var(--font-heading);
  font-size: 52px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -2px;
}

.stat-block-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  line-height: 1.4;
}

.stat-block-context {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 8px;
  margin-top: 4px;
}

.comp-bar-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

.comp-bar-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.comp-bar-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}

.comp-bar-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.comp-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1);
}

.comp-bar-fill.a { background: var(--gold); }
.comp-bar-fill.b { background: var(--cobalt); }

.comp-bar-val {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  font-family: var(--font-mono);
}

.ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.ring-svg { transform: rotate(-90deg); }

.ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 4;
}

.ring-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 226;
  stroke-dashoffset: 226;
  transition: stroke-dashoffset 1.5s cubic-bezier(0.34,1.56,0.64,1);
}

.ring-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  text-align: center;
}

.ring-value {
  position: absolute;
  font-family: var(--font-heading);
  font-size: 22px;
  color: var(--gold);
  font-weight: 600;
}

.ring-container {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.timeline-wrap {
  display: flex;
  flex-direction: column;
  gap: 0;
  width: 100%;
}

.timeline-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  position: relative;
}

.timeline-step:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 9px;
  top: 28px;
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.1);
}

.timeline-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  flex-shrink: 0;
  position: relative;
  opacity: 0;
  transition: opacity 0.4s;
}

.timeline-dot.active {
  background: var(--gold);
}

.timeline-dot.lit { opacity: 1; }

.timeline-text {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .visuals-row {
    padding: 0 16px 24px;
    gap: 10px;
  }
  .visual-card {
    min-width: 140px;
    padding: 16px;
  }
  .stat-block-value { font-size: 36px; }
}
</style>
</head>
<body>

<div id="access-gate">
  <h1>ENTER ACCESS CODE</h1>
  <input type="password" id="access-input" placeholder="****">
  <button id="access-btn" onclick="checkAccess()">CONFIRM</button>
  <div id="access-error">ACCESS DENIED</div>
</div>

<div id="screen-welcome">
  <div class="hero-bg-text">STC</div>
  <div style="font-family:var(--font-heading); font-size:120px; text-transform:uppercase; font-weight:900; letter-spacing:-10px; line-height:0.8;">SEE THE <span style="color:var(--gold)">UNSEEN</span></div>
  <button class="welcome-btn" onclick="enterApp()">EXPLORE THE MARKET ENVIRONMENT →</button>
</div>

<section id="screen-input" style="display:none; height:100vh; padding:80px;">
  <!-- Minimal Float Cues -->
  <div style="position:absolute; top:40px; left:40px; font-family:var(--font-mono); font-size:8px; opacity:0.3;">[NEURAL_GATE: ACTIVE]</div>
  <textarea id="user-input" style="width:100%; background:transparent; border:none; border-bottom:2px solid #fff; color:#fff; font-size:42px; font-family:var(--font-heading); outline:none;" placeholder="Define demographic..."></textarea>
  <button id="analyze-btn" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:800;">ANALYSE</button>
</section>

<div id="screen-loading-dossier" style="display:none; height:100vh; flex-direction:column; align-items:center; justify-content:center;">
  <div class="loading-big">SYNTHESIZING DOSSIER</div>
  <button class="welcome-btn" id="explore-trigger" style="display:none;" onclick="startDossier()">LET'S GO →</button>
</div>

<div id="output-container" style="display:none;">
  <div id="slides-wrapper"></div>
</div>

<canvas id="three-canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

let audioCtx = null;
function playClick() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(800, audioCtx.currentTime);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}

document.querySelectorAll('button').forEach(btn => btn.addEventListener('click', playClick));

function checkAccess() {
  playClick();
  const input = document.getElementById('access-input');
  if(input.value.toUpperCase() === 'NSFW') {
    gsap.to('#access-gate', { opacity: 0, duration: 0.8, onComplete: () => {
      document.getElementById('access-gate').style.display = 'none';
      document.getElementById('screen-welcome').style.visibility = 'visible';
    }});
  } else {
    gsap.to('#access-input', { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
    document.getElementById('access-error').style.visibility = 'visible';
  }
}

function enterApp() {
  playClick();
  gsap.to('#screen-welcome', { opacity: 0, scale: 1.1, duration: 0.8, onComplete: () => {
    document.getElementById('screen-welcome').style.display = 'none';
    document.getElementById('screen-input').style.display = 'block';
  }});
}

function startDossier() {
  playClick();
  gsap.to('#screen-loading-dossier', { opacity: 0, duration: 0.6, onComplete: () => {
    document.getElementById('screen-loading-dossier').style.display = 'none';
    document.getElementById('output-container').style.display = 'block';
    
    // Global ScrollTrigger for all slides
    document.querySelectorAll('.slide').forEach((sec, idx) => {
      ScrollTrigger.create({
        trigger: sec,
        start: 'top 80%',
        onEnter: () => {
          const paras = sec.querySelectorAll('.p-body');
          gsap.to(paras, { opacity: 1, y: 0, stagger: 0.1, duration: 0.8 });
          
          const vCards = sec.querySelectorAll('.visual-card');
          gsap.fromTo(vCards,
            { opacity: 0, y: 20 },
            { opacity: 1, y: 0, duration: 0.6,
              stagger: 0.1, ease: 'power2.out', delay: 0.4 }
          );
          animateVisuals(sec);
          
          if(sec.dataset.figureStage) setFigureStage(sec.dataset.figureStage);
        }
      });
    });

    ScrollTrigger.refresh();
  }});
}

function populate(data) {
  const wrapper = document.getElementById('slides-wrapper');
  wrapper.innerHTML = '';
  data.slides.forEach((s, i) => {
    if(i === 0) wrapper.appendChild(createInter("LET'S HEAR WHAT A PERSON IN YOUR MARKET IS SAYING.", true));
    
    let slide;
    if(i < 3) {
      slide = createPersonaSlide(i+1, s.title, s.source, s.paragraphs, s.key_stats, s.visuals);
      slide.dataset.figureStage = 'one';
    } else if(i < 8) {
      slide = createMarketSlide(i+1, s.title, s.source, s.paragraphs, [], false, s.key_stats, s.visuals);
      slide.dataset.figureStage = 'market';
    } else {
      slide = createMarketSlide(i+1, s.title, s.source, s.paragraphs, [], false, s.key_stats, s.visuals);
      slide.dataset.figureStage = 'intersection';
    }
    
    wrapper.appendChild(slide);
  });
}

function createPersonaSlide(num, title, src, paras, keyStats, visuals) {
  const s = document.createElement('section');
  s.className = 'slide';
  s.innerHTML = `
    <div class="slide-title">
      <div style="font-family:var(--font-mono);font-size:8px;
        letter-spacing:5px;color:rgba(255,204,0,0.6);
        margin-bottom:8px;">${src}</div>
      <h1 style="font-family:var(--font-heading);
        font-size:clamp(32px,4vw,52px);font-weight:300;
        font-style:italic;letter-spacing:-1px;
        line-height:1;color:var(--text);">${title}</h1>
    </div>
    <div class="corner-grid" id="grid-${num}">
      ${(paras||[]).map(p => `
        <div class="corner-box">
          <div class="p-body">${p}</div>
        </div>
      `).join('')}
    </div>
    <div class="visuals-row" id="visuals-${num}"></div>
  `;
  setTimeout(() => {
    const vRow = s.querySelector('#visuals-'+num);
    if (vRow && visuals) renderVisuals(vRow, visuals);
  }, 100);
  return s;
}

function createMarketSlide(num, title, src, paras, items, isInter, keyStats, visuals) {
  const s = document.createElement('section');
  s.className = 'slide';
  s.innerHTML = `
    <div class="slide-title">
      <div style="font-family:var(--font-mono);font-size:8px;
        letter-spacing:5px;color:rgba(0,204,255,0.6);
        margin-bottom:8px;">${src}</div>
      <h1 style="font-family:var(--font-heading);
        font-size:clamp(32px,4vw,52px);font-weight:300;
        font-style:italic;letter-spacing:-1px;
        line-height:1;color:var(--text);">${title}</h1>
    </div>
    <div class="corner-grid" id="grid-m${num}">
      ${(paras||[]).map(p => `
        <div class="corner-box">
          <div class="p-body" style="opacity:1;
            transform:none;">${p}</div>
        </div>
      `).join('')}
    </div>
    <div class="visuals-row" id="visuals-m${num}"></div>
  `;
  setTimeout(() => {
    const vRow = s.querySelector('#visuals-m'+num);
    if (vRow && visuals) renderVisuals(vRow, visuals);
  }, 100);
  return s;
}

function createInter(txt, hasSure = false) {
  const sec = document.createElement('section');
  sec.className = 'interstitial';
  sec.innerHTML = `
    <div class="scan-line"></div>
    <div class="inter-text">${txt}</div>
    ${hasSure ? `<button class="welcome-btn" onclick="nextSlide(this)" style="margin-top:40px; opacity:0; transform:translateY(20px);">SURE</button>` : ''}
  `;
  
  ScrollTrigger.create({
    trigger: sec,
    start: 'top 80%',
    onEnter: () => {
      gsap.to(sec.querySelector('.scan-line'), { left: '100%', duration: 1.5, ease: "none" });
      if(hasSure) gsap.to(sec.querySelector('button'), { opacity: 1, y: 0, duration: 0.8, delay: 0.5 });
    }
  });

  return sec;
}

function nextSlide(btn) {
  playClick();
  const next = btn.closest('section').nextElementSibling;
  if(next) gsap.to(window, { scrollTo: next, duration: 1 });
}

function renderVisuals(container, visuals) {
  if (!visuals || !visuals.length) return;
  visuals.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'visual-card';
    card.style.animationDelay = (i * 0.15) + 's';

    if (v.type === 'stat_block') {
      card.innerHTML = `
        <div class="stat-block-value">${v.value}</div>
        <div class="stat-block-label">${v.label}</div>
        ${v.context ? `<div class="stat-block-context">${v.context}</div>` : ''}
      `;

    } else if (v.type === 'comparison_bar') {
      card.innerHTML = `
        <div class="comp-bar-wrap">
          <div class="comp-bar-item">
            <div class="comp-bar-label">${v.label_a}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="comp-bar-track" style="flex:1;">
                <div class="comp-bar-fill a" 
                  data-val="${v.value_a}"></div>
              </div>
              <div class="comp-bar-val">${v.value_a}%</div>
            </div>
          </div>
          <div class="comp-bar-item">
            <div class="comp-bar-label">${v.label_b}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="comp-bar-track" style="flex:1;">
                <div class="comp-bar-fill b" 
                  data-val="${v.value_b}"></div>
              </div>
              <div class="comp-bar-val">${v.value_b}%</div>
            </div>
          </div>
        </div>
      `;

    } else if (v.type === 'percentage_ring') {
      const offset = 226 - (226 * v.value / 100);
      card.innerHTML = `
        <div class="ring-wrap">
          <div class="ring-container">
            <svg class="ring-svg" width="80" height="80" 
              viewBox="0 0 80 80">
              <circle class="ring-bg" cx="40" cy="40" r="36"/>
              <circle class="ring-fill" cx="40" cy="40" r="36"
                data-offset="${offset}"/>
            </svg>
            <div class="ring-value">${v.value}%</div>
          </div>
          <div class="ring-label">${v.label}</div>
        </div>
      `;

    } else if (v.type === 'timeline') {
      card.innerHTML = `
        <div class="timeline-wrap">
          ${(v.points||[]).map((pt, i) => `
            <div class="timeline-step">
              <div class="timeline-dot ${i===0?'active':''}" 
                data-idx="${i}"></div>
              <div class="timeline-text">${pt}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    container.appendChild(card);
  });

  setTimeout(() => animateVisuals(container), 400);
}

function animateVisuals(container) {
  container.querySelectorAll('.comp-bar-fill').forEach(bar => {
    bar.style.width = bar.dataset.val + '%';
  });
  container.querySelectorAll('.ring-fill').forEach(ring => {
    ring.style.strokeDashoffset = ring.dataset.offset;
  });
  container.querySelectorAll('.timeline-dot').forEach((dot,i) => {
    setTimeout(() => dot.classList.add('lit'), i * 300);
  });
}

// 3D SCENE
const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,1000);
const rdr=new THREE.WebGLRenderer({canvas:document.getElementById('three-canvas'),alpha:true,antialias:true});
rdr.setSize(window.innerWidth,window.innerHeight); cam.position.z=5;
const grid=new THREE.Mesh(new THREE.PlaneGeometry(30,30,20,20), new THREE.MeshBasicMaterial({color:0x222222,wireframe:true,transparent:true,opacity:0.1}));
grid.rotation.x=Math.PI/2; grid.position.y=-4; sc.add(grid);
const knotMat=new THREE.MeshPhysicalMaterial({color:0xffffff, metalness:0, roughness:0.05, transmission:1, thickness:5, ior:1.5, reflectivity:0.8, clearcoat:1, clearcoatRoughness:0.1, emissive:0xffffff, emissiveIntensity:0.02, transparent:true});
const knot=new THREE.Mesh(new THREE.TorusKnotGeometry(1.6,0.5,300,48,3,4), knotMat); sc.add(knot);
sc.add(new THREE.AmbientLight(0xffffff, 0.5));
const point = new THREE.PointLight(0xffffff, 1); point.position.set(5,5,5); sc.add(point);

const figureGroup = new THREE.Group();
sc.add(figureGroup);
let currentStage = 'none';

function createFigure(x, y, z, scale=1) {
  const g = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 });
  const headGeo = new THREE.CircleGeometry(0.18 * scale, 12), headEdge = new THREE.EdgesGeometry(headGeo);
  g.add(new THREE.LineSegments(headEdge, mat));
  const bodyPts = [new THREE.Vector3(0, -0.18*scale, 0), new THREE.Vector3(0, -0.7*scale, 0)];
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(bodyPts), mat));
  const armPts = [new THREE.Vector3(-0.3*scale, -0.35*scale, 0), new THREE.Vector3(0.3*scale, -0.35*scale, 0)];
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(armPts), mat));
  [[-0.2, 0.2], [0.2, -0.2]].forEach(([lx, rx]) => {
    const legPts = [new THREE.Vector3(0, -0.7*scale, 0), new THREE.Vector3(lx*scale, -1.1*scale, 0)];
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(legPts), mat));
  });
  g.position.set(x, y, z);
  g.userData = { bobOffset: Math.random() * Math.PI * 2, baseY: y };
  return g;
}

function createMarketStall(x, y, z) {
  const g = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.3 });
  const boxGeo = new THREE.BoxGeometry(1.2, 0.8, 0.6), boxEdge = new THREE.EdgesGeometry(boxGeo);
  g.add(new THREE.LineSegments(boxEdge, mat));
  const roofPts = [new THREE.Vector3(-0.8, 0.6, 0.4), new THREE.Vector3(0, 0.9, 0), new THREE.Vector3(0.8, 0.6, 0.4)];
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(roofPts), mat));
  g.position.set(x, y, z); g.userData = { bobOffset: Math.random() * Math.PI * 2, baseY: y };
  return g;
}

function setFigureStage(stage) {
  if(stage === currentStage) return; currentStage = stage;
  figureGroup.children.forEach(c => gsap.to(c.children.map(m=>m.material), { opacity: 0, duration: 0.5, onComplete: () => figureGroup.remove(c) }));
  setTimeout(() => {
    figureGroup.clear();
    if(stage === 'one') figureGroup.add(createFigure(0, 0.5, 0, 1.8));
    else if(stage === 'market') { for(let i=0; i<8; i++) figureGroup.add(createMarketStall((i%4-1.5)*2.5, Math.floor(i/4)*2-0.8, 0)); }
    else if(stage === 'intersection') {
      for(let i=0; i<5; i++) figureGroup.add(createFigure(-3 + i*0.4, (i%3)*0.9 - 0.5, 0, 0.5));
      for(let i=0; i<4; i++) figureGroup.add(createMarketStall(2 + (i%2)*2, Math.floor(i/2)*1.8 - 0.5, 0));
    }
    figureGroup.children.forEach((c, idx) => {
      c.children.forEach(m => { m.material.opacity = 0; gsap.to(m.material, { opacity: 0.35, duration: 1, delay: idx*0.05 }); });
    });
  }, 600);
}

function anim(){
  requestAnimationFrame(anim); knot.rotation.z+=0.002; knot.rotation.y+=0.004;
  figureGroup.children.forEach(f => f.position.y = f.userData.baseY + Math.sin(Date.now()*0.001 + f.userData.bobOffset)*0.04);
  const sy = window.scrollY;
  knot.position.x = Math.sin(sy * 0.001) * 2; knot.scale.setScalar(1 + Math.sin(sy * 0.001) * 0.1);
  rdr.render(sc,cam);
}
anim();

// ANALYZE ENGINE
document.getElementById('analyze-btn').onclick=async()=>{
  playClick();
  const val=document.getElementById('user-input').value.trim();
  if(!val) return;
  try {
    document.getElementById('screen-input').style.opacity = '0.3';
    const res=await fetch('http://127.0.0.1:5010/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:val})});
    const data=await res.json();
    gsap.to('#screen-input', {opacity:0, duration:0.6, onComplete:()=>{
      document.getElementById('screen-input').style.display='none';
      document.getElementById('screen-loading-dossier').style.display='flex';
      setTimeout(()=> {
        document.getElementById('explore-trigger').style.display='block';
        gsap.fromTo('#explore-trigger', {opacity:0}, {opacity:1, duration:1.5});
      }, 2000);
    }});
    populate(data);
  } catch(e) { alert("CONNECTION ERROR"); }
};
</script>
